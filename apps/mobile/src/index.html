<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vitalogy</title>
    <base href="/" />
    <!-- viewport-fit=cover lets the WebView extend under the notch / home indicator
         so we can pad with env(safe-area-inset-*) ourselves. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- VeloPulse design tokens: Sora for metric numerals, Space Grotesk for
         tracked labels, Inter for body. Material Symbols for outline icons. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
  </head>

</html>
