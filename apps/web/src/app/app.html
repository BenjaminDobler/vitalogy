<ui-shell>
  <router-outlet></router-outlet>
</ui-shell>

<!-- Coach drawer — overlays everything. Backdrop tap or Esc closes. -->
<div
  class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm transition-opacity duration-300"
  [class.opacity-0]="!coachPanel.isOpen()"
  [class.pointer-events-none]="!coachPanel.isOpen()"
  [class.opacity-100]="coachPanel.isOpen()"
  (click)="coachPanel.close()"
></div>
<aside
  class="fixed top-0 right-0 bottom-0 z-50 w-full sm:w-[480px] velo-glass border-l border-white/10 flex flex-col transition-transform duration-300 ease-out shadow-2xl"
  [class.translate-x-0]="coachPanel.isOpen()"
  [class.translate-x-full]="!coachPanel.isOpen()"
>
  <lib-chat-panel />
</aside>
