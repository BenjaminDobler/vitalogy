# Vitalogy nginx server block. Drop into /etc/nginx/sites-available/
# (or wherever adorable's lives) and symlink into sites-enabled.
#
# Run `sudo certbot --nginx -d vitalogy.app -d www.vitalogy.app` once
# afterwards — certbot edits this file in-place to add the SSL block +
# a redirect from 80→443. The block below is what the file looks like
# BEFORE certbot runs; you can also use it as the post-certbot shape
# if you'd rather hand-manage TLS.

server {
    listen 80;
    listen [::]:80;
    server_name vitalogy.app www.vitalogy.app;

    # ACME http-01 challenge handled by certbot — leave the rest of /
    # serving the SPA until certbot rewrites this to a 443 redirect.

    # Recording uploads can run a few MB once you have long rides;
    # default 1MB would silently 413.
    client_max_body_size 25M;

    # Static SPA from the rsynced web build.
    root /opt/vitalogy/web;
    index index.html;

    # API → NestJS on 127.0.0.1:3001. The trailing slashes matter:
    # /api/foo → http://127.0.0.1:3001/api/foo (full path preserved).
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Strava callback returns to /api/auth/strava/callback — covered by
    # the location above. Google + email auth flows likewise.

    # Long-lived caching for fingerprinted asset chunks. Angular's
    # production build names them like chunk-ABCDEF12.js.
    location ~* \.(?:js|css|woff2?|ico|svg|png|jpg|jpeg|webp|avif)$ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history-mode fallback: every other path falls through to index.html
    # so `/activities/abc` deep links survive a refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
